version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5435:5432'
    environment:
      POSTGRES_DB:       careerpilot
      POSTGRES_USER:     careerpilot
      POSTGRES_PASSWORD: careerpilot123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./python-service/app/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerpilot -d careerpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - '5000:5000'
    env_file: ./backend/.env
    environment:
      - PYTHON_SERVICE_URL=http://python-service:8000
    depends_on:
      - python-service
    volumes:
      - ./backend/uploads:/app/uploads

  python-service:
    build: ./python-service
    ports:
      - '8000:8000'
    env_file: ./python-service/.env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  default:
    name: careerpilot-network
